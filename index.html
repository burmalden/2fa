<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Аутентификатор</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>2FA Vault</h1>
            <p>Безопасное хранение и генерация одноразовых кодов</p>
        </header>

        <!-- Список аккаунтов -->
        <div class="accounts-section">
            <h2>Мои ключи</h2>
            <div id="accounts-list" class="accounts-list">
                <!-- Аккаунты будут здесь -->
                <div class="empty-state" id="empty-state">
                    <p>У вас пока нет добавленных ключей</p>
                    <button onclick="showAddAccountModal()">Добавить первый ключ</button>
                </div>
            </div>
        </div>

        <!-- Кнопка добавления -->
        <div class="actions">
            <button class="add-btn" onclick="showAddAccountModal()">
                Добавить ключ
            </button>
            <button onclick="logout()">
                Выйти
            </button>
        </div>
    </div>

    <!-- Модальное окно добавления аккаунта -->
    <div id="add-account-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Добавить ключ</h2>
                <button class="close-btn" onclick="hideAddAccountModal()">×</button>
            </div>
            
            <div class="modal-body">
                <!--Ручной ввод -->
                <div class="tab-content active" id="manual-tab">
                    <h3>Ввести вручную</h3>
                    <div class="input-group">
                        <label>Название сервиса:</label>
                        <input type="text" id="issuer-input" placeholder="Например: Google, GitHub">
                    </div>
                    <div class="input-group">
                        <label>Секретный ключ:</label>
                        <input type="text" id="secret-input" placeholder="JBSWY3DPEHPK3PXP">
                    </div>
                    <button onclick="addManualAccount()">Добавить ключ</button>
                </div>
            </div>

            <div class="qr-upload-section">
                <h3>Импорт через QR</h3>

                <label for="qr-input" class="upload-btn">
                    📷 Загрузить QR-код
                </label>

                <input
                    type="file"
                    id="qr-input"
                    accept="image/*"
                    onchange="handleQRUpload(event)"
                    hidden
                >
            </div>

            <div class="camera-section">

                <h3>Сканирование камерой</h3>

                <video
                    id="qr-video"
                    autoplay
                    playsinline
                ></video>

                <button onclick="startCameraScanner()">
                    Сканировать QR
                </button>
                <button onclick="stopCameraScanner()">
                    Остановить камеру
                </button>

            </div>
        </div>
    </div>

    <!-- Модальное окно мастер-пароля -->
<div id="password-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Регистрация</h2>
        </div>
        <div class="modal-body">
            <div class="input-group">
                <label>Имя пользователя:</label>
                <input
                    type="text"
                    id="register-username"
                    placeholder="Введите имя пользователя"
                >
            </div>
            <div class="input-group">
                <label>Пароль:</label>
                <input type="password" id="master-password" placeholder="Введите надежный пароль">
            </div>
            <div class="input-group">
                <label>Подтвердите пароль:</label>
                <input type="password" id="confirm-password" placeholder="Повторите пароль">
            </div>
            <div class="modal-actions">
                <div class="modal-actions">

                    <button onclick="setupMasterPassword()">
                        Создать аккаунт
                    </button>

                    <button onclick="switchToLogin()">
                        Уже есть аккаунт
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно ввода пароля -->
<div id="login-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Вход</h2>
        </div>
        <div class="modal-body">

            <div class="input-group">
                <label>Имя пользователя:</label>
                <input
                    type="text"
                    id="login-username"
                    placeholder="Введите имя пользователя"
                >
            </div>

            <div class="input-group">
                <label>Пароль:</label>
                <input type="password" id="login-password" placeholder="Введите пароль">
            </div>
            <div class="modal-actions">
                <div class="modal-actions">

                <button onclick="login()">
                    Войти
                </button>

                <button onclick="switchToRegister()">
                    Регистрация
                </button>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- Подключаем библиотеки -->
    <script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/buffer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/index.js"></script>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</body>
</html>
